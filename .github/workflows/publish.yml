name: Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type (patch/minor/major)'
        required: false
        default: 'patch'

concurrency:
  group: publish-main
  cancel-in-progress: false

jobs:
  publish:
    if: github.actor != 'github-actions[bot]' && vars.NPM_PUBLISH_ENABLED == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    environment:
      name: npm
      url: https://www.npmjs.com/package/codeh007-mtmauto
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build package
        run: npm run build

      - name: Resolve next version
        id: version
        run: node scripts/prepare-release-version.mjs

      - name: Update package version files
        run: npm version "${{ steps.version.outputs.next_version }}" --no-git-tag-version --allow-same-version

      - name: Verify publish payload
        run: |
          echo "=== Package Contents ==="
          npm pack --dry-run
          echo "=== Package Info ==="
          npm view codeh007-mtmauto@${{ steps.version.outputs.next_version }} --json || echo "Version will be published"

      - name: Publish to npm
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "${NPM_TOKEN}" ]; then
            NODE_AUTH_TOKEN="${NPM_TOKEN}" npm publish --provenance --access public
          else
            echo "ERROR: NPM_TOKEN not configured"
            exit 1
          fi

      - name: Create GitHub Release
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${process.env.VERSION}`,
              name: `v${process.env.VERSION}`,
              draft: false,
              generate_release_notes: true
            });
            console.log('Created release:', data.html_url);
        env:
          VERSION: ${{ steps.version.outputs.next_version }}

      - name: Commit version bump and push
        if: success()
        env:
          VERSION: ${{ steps.version.outputs.next_version }}
        run: |
          git add package.json package-lock.json
          git -c user.name='github-actions[bot]' -c user.email='41898282+github-actions[bot]@users.noreply.github.com' commit -m "chore(release): v${VERSION}"
          git push origin HEAD:main

  publish-preview:
    if: github.actor != 'github-actions[bot]' && vars.NPM_PUBLISH_ENABLED != 'true' && github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    environment:
      name: npm-preview
      url: https://www.npmjs.com/package/codeh007-mtmauto
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Publish to npm (preview)
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "${NPM_TOKEN}" ]; then
            NODE_AUTH_TOKEN="${NPM_TOKEN}" npm publish --tag preview --access public
          else
            echo "ERROR: NPM_TOKEN not configured"
            exit 1
          fi
        continue-on-error: true

      - name: Notice
        if: vars.NPM_PUBLISH_ENABLED != 'true'
        run: |
          echo "=========================================="
          echo "NPM_PUBLISH_ENABLED is not set to 'true'"
          echo "Set this variable in GitHub repository settings"
          echo "to enable automatic publishing on main branch push"
          echo "=========================================="
