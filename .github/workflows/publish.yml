name: Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: publish-main
  cancel-in-progress: false

jobs:
  publish:
    if: github.actor != 'github-actions[bot]' && vars.NPM_PUBLISH_ENABLED == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    environment:
      name: npm
      url: https://www.npmjs.com/package/@mattwin/mtmauto
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Read package metadata
        id: pkg
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          echo "package_name=${PACKAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Type check
        run: npm run check

      - name: Run unit tests
        run: npm test

      - name: Build package
        run: npm run build

      - name: Smoke check built CLI help
        run: |
          node dist/cli/index.js
          node dist/cli/index.js --help
          node dist/cli/index.js hongguo --help
          node dist/cli/index.js hongguo run --help

      - name: Resolve next version
        id: version
        run: node scripts/prepare-release-version.mjs

      - name: Update package version files
        run: npm version "${{ steps.version.outputs.next_version }}" --no-git-tag-version --allow-same-version

      - name: Verify publish payload
        run: |
          echo "=== Package Contents ==="
          npm pack --dry-run
          echo "=== Package Info ==="
          npm view ${{ steps.pkg.outputs.package_name }}@${{ steps.version.outputs.next_version }} --json || echo "Version will be published"

      - name: Publish to npm (trusted publishing preferred)
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if npm publish --provenance; then
            echo "Published with trusted publishing (OIDC)."
            exit 0
          fi

          if [ -n "${NPM_TOKEN}" ]; then
            echo "Trusted publishing failed; using NPM_TOKEN fallback."
            NODE_AUTH_TOKEN="${NPM_TOKEN}" npm publish --provenance
            exit 0
          fi

          echo "ERROR: Trusted publishing failed and NPM_TOKEN is not configured"
          exit 1

      - name: Commit version bump and push
        if: success()
        env:
          VERSION: ${{ steps.version.outputs.next_version }}
        run: |
          git add package.json package-lock.json
          if git diff --cached --quiet; then
            echo "No version file changes to commit."
          else
            git -c user.name='github-actions[bot]' -c user.email='41898282+github-actions[bot]@users.noreply.github.com' commit -m "chore(release): v${VERSION}"
            git push origin HEAD:main
          fi

      - name: Create GitHub Release
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${process.env.VERSION}`,
              target_commitish: 'main',
              name: `v${process.env.VERSION}`,
              draft: false,
              generate_release_notes: true
            });
            console.log('Created release:', data.html_url);
        env:
          VERSION: ${{ steps.version.outputs.next_version }}

  publish-preview:
    if: github.actor != 'github-actions[bot]' && vars.NPM_PUBLISH_ENABLED != 'true' && github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    environment:
      name: npm-preview
      url: https://www.npmjs.com/package/@mattwin/mtmauto
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Run unit tests
        run: npm test

      - name: Build package
        run: npm run build

      - name: Smoke check built CLI help
        run: |
          node dist/cli/index.js
          node dist/cli/index.js --help
          node dist/cli/index.js hongguo --help
          node dist/cli/index.js hongguo run --help

      - name: Publish to npm (preview)
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "${NPM_TOKEN}" ]; then
            NODE_AUTH_TOKEN="${NPM_TOKEN}" npm publish --tag preview
          else
            echo "ERROR: NPM_TOKEN not configured"
            exit 1
          fi

      - name: Notice
        if: vars.NPM_PUBLISH_ENABLED != 'true'
        run: |
          echo "=========================================="
          echo "NPM_PUBLISH_ENABLED is not set to 'true'"
          echo "Set this variable in GitHub repository settings"
          echo "to enable automatic publishing on main branch push"
          echo "=========================================="
