name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Run unit tests
        run: npm test

      - name: Build package
        run: npm run build

      - name: Smoke check built CLI help
        run: |
          node dist/cli/index.js
          node dist/cli/index.js --help
          node dist/cli/index.js hongguo --help
          node dist/cli/index.js hongguo run --help

      - name: Verify publish payload
        run: npm pack --dry-run

      - name: Validate package.json fields
        run: |
          node -e "
            const pkg = require('./package.json');
            const required = ['name', 'version', 'description', 'main', 'bin', 'files', 'publishConfig'];
            const missing = required.filter(f => !pkg[f]);
            if (missing.length > 0) {
              console.error('Missing required fields:', missing);
              process.exit(1);
            }
            console.log('package.json fields validated');
          "

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check for sensitive data in repository
        run: |
          if grep -Er "ghp_[A-Za-z0-9]{20,}" . --include="*.yml" --include="*.yaml" --include="*.json" --include="*.ts" --include="*.js" 2>/dev/null; then
            echo "ERROR: Found potential GitHub token patterns in code"
            exit 1
          fi
          if grep -Er "npm_[A-Za-z0-9]{20,}" . --include="*.yml" --include="*.yaml" --include="*.json" --include="*.ts" --include="*.js" 2>/dev/null; then
            echo "ERROR: Found potential npm token patterns in code"
            exit 1
          fi
          echo "No sensitive data patterns found in code"
